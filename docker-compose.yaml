name: todo

services:
  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - todo-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

  app:
    build: .
    container_name: todo
    depends_on:
      - mongodb
    ports:
      - "${PORT}:3000"
    networks:
      - todo-network
    environment:
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_URI: ${MONGO_URI}

volumes:
  mongodb_data: {}

networks:
  todo-network:
    driver: bridge