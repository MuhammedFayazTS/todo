name: todo

services:
  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - todo-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - todo-network

  app:
    image: fayaz321/todo:latest
    container_name: todo
    depends_on:
      - mongodb
      - redis
    ports:
      - "${PORT}:3000"
    networks:
      - todo-network
    environment:
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: redis://redis:6379

volumes:
  mongodb_data: {}

networks:
  todo-network:
    driver: bridge